<meta charset="UTF-8">
<title>Offline Godam Software</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
text-align:center;
}

h1{
background:#1976d2;
color:white;
padding:12px;
}

input,select{
padding:8px;
margin:4px;
}

button{
padding:8px 12px;
background:#1976d2;
color:white;
border:none;
cursor:pointer;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
background:white;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
}

th{
background:#1976d2;
color:white;
}

.card{
display:inline-block;
background:white;
padding:10px;
margin:10px;
width:200px;
box-shadow:0 0 5px #ccc;
}

#app{
display:none;
}

</style>

</head>

<body>

<h1>Wadi al Bhata Management System Oman Manegar Vivek </h1>

<div id="login">

<h3>Login</h3>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<button onclick="backupData()">Backup Data</button>

<input type="file" id="restoreFile">

<button onclick="restoreData()">Restore Data</button>

</div>

<div id="app">

<button onclick="logout()">Logout</button>

<h3>Dashboard</h3>

<div class="card">
Total Stock
<h2 id="totalStock">0</h2>
</div>

<div class="card">
Total Profit
<h2 id="totalProfit">0</h2>
</div>

<div class="card">
Total Sales
<h2 id="totalSales">0</h2>
</div>


<h3>Add Item</h3>

<select id="category">
<option>Rice</option>
<option>Oil</option>
<option>Soap</option>
<option>Other</option>
</select>

<input id="name" placeholder="Item Name">
<input id="qty" placeholder="Quantity">
<input id="buy" placeholder="Buy Price">
<input id="sell" placeholder="Sell Price">

<button onclick="addItem()">Add Item</button>


<h3>Incoming Stock</h3>

<input id="inName" placeholder="Item Name">
<input id="inQty" placeholder="Qty">

<button onclick="incoming()">Add</button>


<h3>Outgoing Sell</h3>

<input id="outName" placeholder="Item Name">
<input id="outQty" placeholder="Qty">

<button onclick="outgoing()">Sell</button>


<h3>Search</h3>

<input id="search" onkeyup="searchItem()" placeholder="Search item">


<h3>Stock List</h3>

<table id="table">

<tr>
<th>Category</th>
<th>Item</th>
<th>Stock</th>
<th>Buy</th>
<th>Sell</th>
<th>Value</th>
<th>Profit</th>
<th>Delete</th>
</tr>

</table>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="admin" && p=="1234"){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

}else{

alert("Wrong Login")

}

}

function logout(){
location.reload()
}

let items = JSON.parse(localStorage.getItem("items")) || []
let sales = JSON.parse(localStorage.getItem("sales")) || 0

function save(){

localStorage.setItem("items",JSON.stringify(items))
localStorage.setItem("sales",sales)

}

function addItem(){

let category=document.getElementById("category").value
let name=document.getElementById("name").value
let qty=parseInt(document.getElementById("qty").value)
let buy=parseFloat(document.getElementById("buy").value)
let sell=parseFloat(document.getElementById("sell").value)

items.push({category,name,stock:qty,buy,sell})

save()
show()

}

function incoming(){

let name=document.getElementById("inName").value
let qty=parseInt(document.getElementById("inQty").value)

items.forEach(i=>{
if(i.name==name){
i.stock+=qty
}
})

save()
show()

}

function outgoing(){

let name=document.getElementById("outName").value
let qty=parseInt(document.getElementById("outQty").value)

items.forEach(i=>{
if(i.name==name){

i.stock-=qty
sales+=qty*i.sell

}
})

save()
show()

}

function deleteItem(index){

items.splice(index,1)

save()
show()

}

function show(){

let table=document.getElementById("table")

let totalStock=0
let totalProfit=0

table.innerHTML=`<tr>
<th>Category</th>
<th>Item</th>
<th>Stock</th>
<th>Buy</th>
<th>Sell</th>
<th>Value</th>
<th>Profit</th>
<th>Delete</th>
</tr>`

items.forEach((i,index)=>{

let value=i.stock*i.sell
let profit=(i.sell-i.buy)*i.stock

totalStock+=i.stock
totalProfit+=profit

table.innerHTML+=`

<tr>
<td>${i.category}</td>
<td>${i.name}</td>
<td>${i.stock}</td>
<td>${i.buy}</td>
<td>${i.sell}</td>
<td>${value}</td>
<td>${profit}</td>
<td><button onclick="deleteItem(${index})">Delete</button></td>
</tr>

`

})

document.getElementById("totalStock").innerText=totalStock
document.getElementById("totalProfit").innerText=totalProfit
document.getElementById("totalSales").innerText=sales

}

function searchItem(){

let input=document.getElementById("search").value.toLowerCase()

let rows=document.querySelectorAll("#table tr")

rows.forEach((row,i)=>{

if(i==0) return

let text=row.innerText.toLowerCase()

row.style.display=text.includes(input)?"":"none"

})

}

show()

</script>
<script>

function backupData(){

let data = localStorage.getItem("items")

if(!data){
alert("Backup ke liye data nahi hai")
return
}

let blob = new Blob([data], {type:"application/json"})

let a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "godam_backup.json"

document.body.appendChild(a)

a.click()

document.body.removeChild(a)

}

function restoreData(){

let file = document.getElementById("restoreFile").files[0]

let reader = new FileReader()

reader.onload = function(e){

localStorage.setItem("items", e.target.result)

alert("Data Restore Ho Gaya")

location.reload()

}

reader.readAsText(file)

}

</script>

</body>

</html>
